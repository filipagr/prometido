<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Prometido — Diagnóstico</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 880px; margin: 2rem auto; padding: 0 1rem; color: #111; }
  h1 { font-size: 1.4rem; }
  .test { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: .75rem 0; }
  .test h3 { margin: 0 0 .5rem; font-size: 1rem; }
  .ok { color: #047857; }
  .err { color: #b91c1c; }
  .warn { color: #b45309; }
  pre { background: #f5f5f5; padding: .5rem; overflow: auto; max-height: 220px; font-size: 12px; }
  code { background: #f5f5f5; padding: 2px 4px; border-radius: 3px; font-size: 12px; }
  button { padding: .5rem 1rem; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>
<h1>Prometido — Diagnóstico de produção</h1>
<p>Esta página testa exactamente o que o site faz: chamadas ao backend Render
e ao frontend Vercel. Carrega <strong>Correr testes</strong>.</p>

<button onclick="run()">Correr testes</button>
<div id="results"></div>

<script>
const API = "https://prometido-api.onrender.com/api";
const SITE = "https://prometido-app.vercel.app";

function add(html) {
  document.getElementById("results").insertAdjacentHTML("beforeend", html);
}

async function timed(label, fn) {
  const t0 = performance.now();
  try {
    const r = await fn();
    const ms = Math.round(performance.now() - t0);
    return { ok: true, ms, ...r };
  } catch (e) {
    const ms = Math.round(performance.now() - t0);
    return { ok: false, ms, error: e.message };
  }
}

async function fetchJson(url) {
  const res = await fetch(url, { cache: "no-store" });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = text.slice(0, 500); }
  return { status: res.status, headers: Object.fromEntries(res.headers.entries()), data };
}

async function run() {
  document.getElementById("results").innerHTML = "<p>A correr testes…</p>";

  // 1. Health
  const h = await timed("health", () => fetchJson(`${API}/health`));
  add(`<div class="test"><h3>1. ${API}/health</h3>
    <p class="${h.ok && h.status===200 ? 'ok' : 'err'}">
      ${h.ok ? `HTTP ${h.status} em ${h.ms}ms` : `FALHOU (${h.ms}ms): ${h.error}`}
    </p>
    <pre>${JSON.stringify(h.data ?? h.error, null, 2)}</pre>
  </div>`);

  // 2. Parties
  const p = await timed("parties", () => fetchJson(`${API}/parties`));
  const pCount = Array.isArray(p.data) ? p.data.length : 0;
  add(`<div class="test"><h3>2. ${API}/parties</h3>
    <p class="${p.ok && pCount > 0 ? 'ok' : 'err'}">
      ${p.ok ? `HTTP ${p.status} em ${p.ms}ms · ${pCount} partidos` : `FALHOU: ${p.error}`}
    </p>
    <pre>${pCount > 0
      ? p.data.map(x => `${x.id} ${x.short_name} — ${x.promise_count} promessas`).join("\n")
      : JSON.stringify(p.data, null, 2)}</pre>
  </div>`);

  // 3. Elections
  const e = await timed("elections", () => fetchJson(`${API}/elections`));
  const eCount = Array.isArray(e.data) ? e.data.length : 0;
  add(`<div class="test"><h3>3. ${API}/elections</h3>
    <p class="${e.ok && eCount > 0 ? 'ok' : 'err'}">
      ${e.ok ? `HTTP ${e.status} em ${e.ms}ms · ${eCount} eleições` : `FALHOU: ${e.error}`}
    </p></div>`);

  // 4. Search
  const s = await timed("search", () => fetchJson(`${API}/search?topic=habita%C3%A7%C3%A3o&limit=3`));
  add(`<div class="test"><h3>4. ${API}/search?topic=habitação</h3>
    <p class="${s.ok ? 'ok' : 'err'}">${s.ok ? `HTTP ${s.status} em ${s.ms}ms · total=${s.data?.total}` : s.error}</p>
  </div>`);

  // 5. Página homepage do Vercel
  const v = await timed("vercel-home", async () => {
    const r = await fetch(SITE, { cache: "no-store" });
    const t = await r.text();
    return { status: r.status, hasParties: /Partidos<\/h2>[\s\S]{0,2000}party\//.test(t), len: t.length, snippet: t.slice(0, 400) };
  });
  add(`<div class="test"><h3>5. ${SITE} (homepage HTML)</h3>
    <p class="${v.ok && v.hasParties ? 'ok' : 'err'}">
      ${v.ok ? `HTTP ${v.status} em ${v.ms}ms · partidos no HTML: ${v.hasParties ? 'SIM' : 'NÃO'}` : v.error}
    </p>
    <pre>${v.snippet || ''}</pre>
  </div>`);

  // 6. Diagnóstico
  let diag = "<div class='test'><h3>Diagnóstico</h3><ul>";
  if (!h.ok) diag += "<li class='err'>Backend Render não respondeu — provável cold-start ainda em curso (Render free tier dorme após 15min). Tenta de novo em 60s.</li>";
  else if (h.ms > 8000) diag += `<li class='warn'>Backend acordou mas demorou ${h.ms}ms — Vercel SSR (timeout ~10s) pode estar a falhar quando o cold-start é mais lento que isso.</li>`;
  if (p.ok && pCount === 0) diag += "<li class='err'>API responde mas devolve 0 partidos — DB pode não estar no container.</li>";
  if (v.ok && !v.hasParties && p.ok && pCount > 0) diag += "<li class='warn'>API tem partidos mas a homepage do Vercel não os mostra — SSR está a falhar (o catch devolve []).</li>";
  diag += "</ul></div>";
  add(diag);
}
</script>
</body>
</html>
